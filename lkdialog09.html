<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: In der Apotheke</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --accent-green: #a5d6a7;
            --dark-green: #1b5e20;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--primary-green);
        }

        /* Flashcard 3D Effekt */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px var(--shadow);
            border-radius: 15px;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid var(--primary-green);
        }

        .flashcard-front {
            background-color: var(--white);
            color: var(--dark-green);
        }

        .flashcard-back {
            background-color: var(--accent-green);
            color: var(--dark-green);
            transform: rotateY(180deg);
        }

        .word-text {
            font-weight: bold;
            word-wrap: break-word;
            width: 100%;
        }

        /* Buttons */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px var(--dark-green);
        }

        button:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px var(--dark-green);
        }

        .btn-nav {
            min-width: 130px;
        }

        .btn-utility {
            background-color: #558b2f;
            box-shadow: 0 4px #33691e;
        }

        @media (max-width: 480px) {
            .flashcard-container {
                height: 250px;
            }
            h1 {
                font-size: 1.4rem;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch: In der Apotheke</h1>
    <div class="progress" id="progress">1 / 50</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="flashcard-front">
                <div class="word-text" id="front-text">Загрузка...</div>
            </div>
            <div class="flashcard-back">
                <div class="word-text" id="back-text">Lade...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-nav" onclick="prevCard()">← Vorherige</button>
        <button class="btn-nav" onclick="nextCard()">Nächste →</button>
        <button class="btn-utility" onclick="shuffleCards()">Mischen</button>
        <button class="btn-utility" onclick="goToStart()">An den Anfang</button>
    </div>
</div>

<script>
    // Vokabeldaten
    const initialVocab = [
        {f: "апте́ка", b: "Apotheke"},
        {f: "фармаце́вт", b: "Apotheker"},
        {f: "вра́ч", b: "Arzt"},
        {f: "покупа́тель", b: "Käufer"},
        {f: "пацие́нт", b: "Patient"},
        {f: "реце́пт", b: "Rezept"},
        {f: "боле́ть / заболе́ть", b: "krank sein / krank werden"},
        {f: "покупа́ть / купи́ть", b: "kaufen"},
        {f: "сове́товать / посове́товать", b: "raten / empfehlen"},
        {f: "помога́ть / помо́чь", b: "helfen"},
        {f: "выпи́сывать / вы́писать", b: "verschreiben (Rezept)"},
        {f: "лека́рство", b: "Medikament"},
        {f: "принима́ть / приня́ть", b: "einnehmen"},
        {f: "пить / вы́пить", b: "trinken / einnehmen"},
        {f: "сбива́ть / сби́ть", b: "senken / herunterschlagen (Temperatur)"},
        {f: "снима́ть / сня́ть", b: "lindern / beseitigen (Schmerz)"},
        {f: "температу́ра", b: "Temperatur"},
        {f: "на́сморк", b: "Schnupfen"},
        {f: "боли́т голова́", b: "der Kopf tut weh"},
        {f: "боли́т живо́т", b: "der Bauch tut weh"},
        {f: "зало́жен но́с", b: "die Nase ist verstopft"},
        {f: "жа́р", b: "Fieber / Hitze"},
        {f: "ви́рус", b: "Virus"},
        {f: "сонли́вость", b: "Schläfrigkeit"},
        {f: "побо́чные де́йствия", b: "Nebenwirkungen"},
        {f: "рво́та", b: "Erbrechen"},
        {f: "табле́тки", b: "Tabletten"},
        {f: "ка́псулы", b: "Kapseln"},
        {f: "гра́нулы", b: "Granulat"},
        {f: "порошо́к", b: "Pulver"},
        {f: "сиро́п", b: "Sirup"},
        {f: "ма́зь", b: "Salbe"},
        {f: "ге́ль", b: "Gel"},
        {f: "ка́пли", b: "Tropfen"},
        {f: "а́мпулы", b: "Ampullen"},
        {f: "пла́стырь", b: "Pflaster"},
        {f: "антибио́тик", b: "Antibiotikum"},
        {f: "жаропонижа́ющее", b: "fiebersenkendes Mittel"},
        {f: "обезбо́ливающее", b: "Schmerzmittel"},
        {f: "термо́метр", b: "Thermometer"},
        {f: "уко́л", b: "Spritze"},
        {f: "еда́", b: "Essen"},
        {f: "приём пи́щи", b: "Mahlzeit"},
        {f: "до́ еды́", b: "vor dem Essen"},
        {f: "во вре́мя еды́", b: "während des Essens"},
        {f: "по́сле еды́", b: "nach dem Essen"},
        {f: "че́рез три́дцать мину́т", b: "nach dreißig Minuten"},
        {f: "за три́дцать мину́т до́ еды́", b: "dreißig Minuten vor dem Essen"},
        {f: "два́ ра́за в де́нь", b: "zweimal am Tag"},
        {f: "по одно́й ка́псуле", b: "je eine Kapsel"}
    ];

    let vocab = [...initialVocab];
    let currentIndex = 0;
    let isFlipped = false;

    const cardEl = document.getElementById('card');
    const frontTextEl = document.getElementById('front-text');
    const backTextEl = document.getElementById('back-text');
    const progressEl = document.getElementById('progress');

    // Initialisierung
    updateCard();

    function updateCard() {
        // Karte zurücksetzen (Vorderseite zeigen)
        isFlipped = false;
        cardEl.classList.remove('flipped');
        
        // Texte setzen
        const current = vocab[currentIndex];
        frontTextEl.innerText = current.f;
        backTextEl.innerText = current.b;
        
        // Fortschritt
        progressEl.innerText = `${currentIndex + 1} / ${vocab.length}`;
        
        // Schriftgröße anpassen
        adjustFontSize(frontTextEl, current.f);
        adjustFontSize(backTextEl, current.b);
    }

    function adjustFontSize(element, text) {
        const len = text.length;
        if (len > 40) {
            element.style.fontSize = "1.1rem";
        } else if (len > 25) {
            element.style.fontSize = "1.4rem";
        } else {
            element.style.fontSize = "1.8rem";
        }
    }

    function flipCard() {
        isFlipped = !isFlipped;
        cardEl.classList.toggle('flipped');
    }

    function nextCard() {
        if (currentIndex < vocab.length - 1) {
            currentIndex++;
        } else {
            currentIndex = 0; // Loop zum Anfang
        }
        updateCard();
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
        } else {
            currentIndex = vocab.length - 1; // Loop zum Ende
        }
        updateCard();
    }

    function shuffleCards() {
        for (let i = vocab.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [vocab[i], vocab[j]] = [vocab[j], vocab[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.code) {
            case 'Space':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });
</script>

</body>
</html>
